# 🚀 Zero-Downtime Deploy — Laravel + Filament → Enhance (LiteSpeed)
# =============================================================================
# Repo:     EngGemy/khadijastore  ·  branch: main  ·  local: alamat-shop
# Panel:    Enhance (NOT cPanel)  ·  Web server: LiteSpeed  ·  PHP 8.4
# SSH:      65.181.116.2:22  ·  user sanadnat1  ·  key auth (no passphrase)
#
# ── Zero-downtime layout on server ───────────────────────────────────────────
#
#   /laravel_app_deploy/
#     releases/20250704T180000-a1b2c3d/   ← fresh tarball each deploy
#     shared/.env                          ← production env (NEVER in git)
#     shared/storage/                      ← uploads, logs, cache (persistent)
#     current → releases/<latest>/         ← atomic symlink swap = instant cutover
#
#   Enhance Document Root (بعد أول deploy ناجح — غيّره يدوياً في Enhance):
#     /laravel_app_deploy/current/public
#
#   ⚠️  Document Root الحالي: /laravel_app/public
#       بعد أول deploy ناجح → غيّره إلى /laravel_app_deploy/current/public
#
# ── LiteSpeed / Enhance notes ────────────────────────────────────────────────
#   • LiteSpeed يقرأ الملفات من Document Root مباشرة — تبديل symlink `current`
#     يغيّر المسار فوراً بدون restart (PHP-FPM/LSPHP يحمّل الكود الجديد تلقائياً).
#   • لا حاجة لـ `systemctl reload` على shared hosting في Enhance.
#   • تأكد أن `public/.htaccess` موجود (Laravel default) — LiteSpeed يدعمه.
#   • الـ host لا يملك composer — لذلك vendor/ يُبنى في CI ويُرفع مع كل release.
#
# ── GitHub Secrets (Settings → Secrets and variables → Actions) ──────────────
#   SSH_HOST          65.181.116.2
#   SSH_PORT          22
#   SSH_USERNAME      sanadnat1
#   SSH_PRIVATE_KEY   full PEM private key (no passphrase)
#   DEPLOY_BASE       /laravel_app_deploy
#   PHP_BIN           php   (or full path e.g. /usr/bin/php8.4 if needed)
#
# ── Disable other deploy workflows ───────────────────────────────────────────
#   If deploy-ftps.yml or deploy-ssh.yml still exist, disable/delete them so
#   only THIS workflow runs on push to main.
# =============================================================================

name: Deploy (Zero-Downtime → Enhance)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.4'
  KEEP_RELEASES: 3

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Build — composer + vite on GitHub runner, pack release tarball
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build release
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PHP 8.4 — matches Enhance panel runtime
      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, ctype, json, tokenizer, xml, pdo, mysql, fileinfo, curl
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      # Ship vendor/ — server has no composer on shared Enhance plan
      - name: Install PHP dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Set up Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies & build assets
        if: hashFiles('package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Verify frontend build output
        if: hashFiles('package.json') != ''
        run: test -d public/build || (echo "❌ public/build missing — vite build failed" && exit 1)

      - name: Verify Laravel bootstrap
        run: |
          test -f artisan || (echo "❌ artisan not found" && exit 1)
          test -d vendor   || (echo "❌ vendor/ not found" && exit 1)
          php artisan --version

      # Bundle: include vendor + public/build, exclude dev/server-only paths
      - name: Build deploy bundle
        run: |
          set -euo pipefail
          mkdir -p deploy-bundle
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='storage' \
            --exclude='*.zip' \
            --exclude='_test*' \
            --exclude='fix-arabic.php' \
            --exclude='kimi-export-*.md' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.editorconfig' \
            --exclude='phpunit.xml' \
            --exclude='phpunit.xml.dist' \
            --exclude='.phpunit.result.cache' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='docker-compose*.yml' \
            --exclude='Dockerfile' \
            --exclude='deploy-bundle' \
            ./ deploy-bundle/
          echo "Bundle size:"
          du -sh deploy-bundle

      - name: Archive release tarball
        run: tar -czf release.tar.gz -C deploy-bundle .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-release
          path: release.tar.gz
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy — scp + SSH releases/symlink swap (zero downtime)
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Enhance
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-release

      - name: Load SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload bundle & activate release
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          DEPLOY_BASE: ${{ secrets.DEPLOY_BASE }}
          PHP_BIN: ${{ secrets.PHP_BIN }}
          GITHUB_SHA: ${{ github.sha }}
          KEEP: ${{ env.KEEP_RELEASES }}
        run: |
          set -euo pipefail

          RELEASE_ID="$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA:0:7}"
          REMOTE="${SSH_USER}@${SSH_HOST}"

          echo "📦 Release ID: ${RELEASE_ID}"
          echo "📂 Deploy base: ${DEPLOY_BASE}"

          # Upload tarball to server /tmp
          scp -P "${SSH_PORT}" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            release.tar.gz "${REMOTE}:/tmp/release-${RELEASE_ID}.tar.gz"

          # Remote deploy script — runs ON the Enhance server
          ssh -p "${SSH_PORT}" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${REMOTE}" \
            "DEPLOY_BASE='${DEPLOY_BASE}' RELEASE_ID='${RELEASE_ID}' PHP_BIN='${PHP_BIN}' KEEP='${KEEP}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          DEPLOY_BASE="${DEPLOY_BASE:-/laravel_app_deploy}"
          RELEASES_DIR="${DEPLOY_BASE}/releases"
          SHARED_DIR="${DEPLOY_BASE}/shared"
          CURRENT_LINK="${DEPLOY_BASE}/current"
          NEW_RELEASE="${RELEASES_DIR}/${RELEASE_ID}"
          PHP="${PHP_BIN:-php}"
          KEEP="${KEEP:-3}"

          echo "─── Zero-downtime deploy: ${RELEASE_ID} ───"

          # Ensure directory tree exists (safe on repeat runs)
          mkdir -p "${RELEASES_DIR}" \
            "${SHARED_DIR}/storage/app/public" \
            "${SHARED_DIR}/storage/framework/cache/data" \
            "${SHARED_DIR}/storage/framework/sessions" \
            "${SHARED_DIR}/storage/framework/views" \
            "${SHARED_DIR}/storage/framework/testing" \
            "${SHARED_DIR}/storage/logs"

          # ── Step 1: Extract new release (old site still live via current/) ──
          mkdir -p "${NEW_RELEASE}"
          tar -xzf "/tmp/release-${RELEASE_ID}.tar.gz" -C "${NEW_RELEASE}"
          rm -f "/tmp/release-${RELEASE_ID}.tar.gz"

          # ── Step 2: shared/.env must exist (never uploaded from CI) ─────────
          if [ ! -f "${SHARED_DIR}/.env" ]; then
            echo "❌ ERROR: ${SHARED_DIR}/.env not found." >&2
            echo "   Run first-time setup (see workflow comments) before deploying." >&2
            rm -rf "${NEW_RELEASE}"
            exit 1
          fi

          # ── Step 3: Symlink persistent paths into the new release ─────────
          rm -rf "${NEW_RELEASE}/storage"
          ln -sfn "${SHARED_DIR}/storage" "${NEW_RELEASE}/storage"
          ln -sfn "${SHARED_DIR}/.env"     "${NEW_RELEASE}/.env"

          # ── Step 4: Prepare new release BEFORE cutover (site still on old) ──
          cd "${NEW_RELEASE}"

          echo "→ migrate --force"
          "${PHP}" artisan migrate --force

          echo "→ config:cache"
          "${PHP}" artisan config:cache

          echo "→ route:cache"
          "${PHP}" artisan route:cache

          echo "→ view:cache"
          "${PHP}" artisan view:cache

          # storage:link — guarded (public/storage → storage/app/public)
          if [ ! -e "${NEW_RELEASE}/public/storage" ]; then
            echo "→ storage:link"
            "${PHP}" artisan storage:link
          fi

          # ── Step 5: ATOMIC CUTover — LiteSpeed instantly serves new code ───
          # ln -sfn is atomic on Linux; visitors never see a half-uploaded tree.
          ln -sfn "${NEW_RELEASE}" "${CURRENT_LINK}"
          echo "✅ Cutover: ${CURRENT_LINK} → ${NEW_RELEASE}"

          # ── Step 6: Restart queue workers (pick up new release code) ───────
          cd "${CURRENT_LINK}"
          "${PHP}" artisan queue:restart 2>/dev/null || true

          # ── Step 7: Prune old releases (keep last N) ───────────────────────
          cd "${RELEASES_DIR}"
          ls -1dt */ 2>/dev/null | tail -n +$((KEEP + 1)) | while read -r old; do
            echo "🗑  Pruning old release: ${old}"
            rm -rf "${old}"
          done

          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "✅ Deploy complete: ${RELEASE_ID}"
          echo "   Active: ${CURRENT_LINK}/public"
          echo ""
          echo "⚠️  REMINDER — Enhance Document Root (مرة واحدة بعد أول deploy):"
          echo "   Change from: /laravel_app/public"
          echo "   Change to:   /laravel_app_deploy/current/public"
          echo "   Enhance → Domains → sanadnatural.com → Document Root"
          echo "════════════════════════════════════════════════════════════"
          REMOTE_SCRIPT

      - name: Remove SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

# =============================================================================
# 📋 ONE-TIME SERVER SETUP — run these commands ONCE via SSH before first deploy
# =============================================================================
#
# ssh -p 22 sanadnat1@65.181.116.2
#
# ── 1) Create zero-downtime directory tree ───────────────────────────────────
#
#   DEPLOY_BASE=/laravel_app_deploy
#
#   mkdir -p "${DEPLOY_BASE}"/releases
#   mkdir -p "${DEPLOY_BASE}"/shared/storage/{app/public,framework/{cache/data,sessions,views,testing},logs}
#   mkdir -p "${DEPLOY_BASE}"/shared/storage/framework/cache
#
# ── 2) Place production .env in shared/ (NEVER commit to git) ────────────────
#
#   # Option A — copy from existing live app:
#   cp /laravel_app/.env "${DEPLOY_BASE}/shared/.env"
#
#   # Option B — create fresh:
#   cp /laravel_app/.env.example "${DEPLOY_BASE}/shared/.env"
#   nano "${DEPLOY_BASE}/shared/.env"
#   # Set: APP_ENV=production, APP_DEBUG=false, APP_URL=https://sanadnatural.com
#   #      DB_*, APP_KEY=base64:...
#
# ── 3) Migrate existing storage (if moving from /laravel_app) ────────────────
#
#   rsync -a /laravel_app/storage/ "${DEPLOY_BASE}/shared/storage/"
#
# ── 4) Permissions (LiteSpeed/Enhance — www-data or lsadm group) ─────────────
#
#   chmod -R 775 "${DEPLOY_BASE}/shared/storage"
#   chmod -R 775 "${DEPLOY_BASE}/shared/storage/framework"
#
# ── 5) Add GitHub Secrets ────────────────────────────────────────────────────
#
#   SSH_HOST=65.181.116.2
#   SSH_PORT=22
#   SSH_USERNAME=sanadnat1
#   SSH_PRIVATE_KEY=<paste full PEM private key>
#   DEPLOY_BASE=/laravel_app_deploy
#   PHP_BIN=php
#
# ── 6) Push to main → first deploy runs automatically ────────────────────────
#
# ── 7) AFTER first successful deploy — change Enhance Document Root ──────────
#
#   Enhance Panel → Domains → sanadnatural.com → Document Root:
#
#     FROM: /laravel_app/public
#     TO:   /laravel_app_deploy/current/public
#
#   LiteSpeed will immediately serve from the new symlinked release path.
#   Future deploys swap `current` atomically — zero downtime, no panel changes.
#
# =============================================================================
