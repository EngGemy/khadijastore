# =============================================================================
# 🚀 Deploy — Laravel + Filament → Enhance (LiteSpeed)
# =============================================================================
# Repo:     EngGemy/khadijastore  ·  branch: main  ·  local: alamat-shop
# Panel:    Enhance (NOT cPanel)  ·  Web server: LiteSpeed  ·  PHP 8.4
# SSH:      65.181.116.2:22  ·  user sanadnat1  ·  key auth (no passphrase)
#
# ── Server layout ──────────────────────────────────────────────────────────────
#
#   /var/www/.../laravel_app_deploy/
#     releases/<timestamp-sha>/   ← fresh tarball each deploy (staging)
#     shared/.env                 ← production env (NEVER in git)
#     shared/storage/             ← uploads, logs, cache (persistent)
#     current/                    ← REAL directory (NOT a symlink)
#                                 LiteSpeed on Enhance refuses to serve static
#                                 files through symlinks — cutover uses rsync.
#
#   Enhance Document Root:
#     .../laravel_app_deploy/current/public
#
# ── Cutover strategy ─────────────────────────────────────────────────────────
#   1. Extract release → releases/<id>/
#   2. migrate --force in staging release (before cutover)
#   3. rsync staging → current/ (real dir), preserve storage + .env
#   4. artisan cache + filament:assets inside current/ (live path)
#
# ── GitHub Secrets ───────────────────────────────────────────────────────────
#   SSH_HOST, SSH_PORT, SSH_USERNAME, SSH_PRIVATE_KEY
#   DEPLOY_BASE=/var/www/77fb2042-b362-46a6-bf46-d8fe02da24eb/laravel_app_deploy
#   PHP_BIN=php
# =============================================================================

name: Deploy (Zero-Downtime → Enhance)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_VERSION: '8.4'
  KEEP_RELEASES: 3

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1: Build — composer + vite on GitHub runner, pack release tarball
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build release
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, ctype, json, tokenizer, xml, pdo, mysql, fileinfo, curl
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install PHP dependencies (production)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Set up Node.js (cached)
        if: hashFiles('package-lock.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Node.js (no lockfile)
        if: hashFiles('package.json') != '' && hashFiles('package-lock.json') == ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies & build assets
        if: hashFiles('package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Verify frontend build output
        if: hashFiles('package.json') != ''
        run: test -d public/build || (echo "❌ public/build missing — vite build failed" && exit 1)

      - name: Verify Laravel bootstrap
        run: |
          test -f artisan || (echo "❌ artisan not found" && exit 1)
          test -d vendor   || (echo "❌ vendor/ not found" && exit 1)
          php artisan --version

      - name: Build deploy bundle
        run: |
          set -euo pipefail
          mkdir -p deploy-bundle
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='storage' \
            --exclude='*.zip' \
            --exclude='_test*' \
            --exclude='fix-arabic.php' \
            --exclude='kimi-export-*.md' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='.editorconfig' \
            --exclude='phpunit.xml' \
            --exclude='phpunit.xml.dist' \
            --exclude='.phpunit.result.cache' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='docker-compose*.yml' \
            --exclude='Dockerfile' \
            --exclude='deploy-bundle' \
            ./ deploy-bundle/
          echo "Bundle size:"
          du -sh deploy-bundle

      - name: Archive release tarball
        run: tar -czf release.tar.gz -C deploy-bundle .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-release
          path: release.tar.gz
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy — scp + rsync cutover into real current/ directory
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Enhance
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-release

      - name: Load SSH key
        run: |
          install -m 700 -d ~/.ssh
          cat <<'EOF' > ~/.ssh/deploy_key
          ${{ secrets.SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload bundle & activate release
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USERNAME }}
          DEPLOY_BASE: ${{ secrets.DEPLOY_BASE }}
          PHP_BIN: ${{ secrets.PHP_BIN }}
          GITHUB_SHA: ${{ github.sha }}
          KEEP: ${{ env.KEEP_RELEASES }}
        run: |
          set -euo pipefail

          RELEASE_ID="$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_SHA:0:7}"
          REMOTE="${SSH_USER}@${SSH_HOST}"

          echo "📦 Release ID: ${RELEASE_ID}"
          echo "📂 Deploy base: ${DEPLOY_BASE}"

          scp -P "${SSH_PORT}" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            release.tar.gz "${REMOTE}:/tmp/release-${RELEASE_ID}.tar.gz"

          ssh -p "${SSH_PORT}" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "${REMOTE}" \
            "DEPLOY_BASE='${DEPLOY_BASE}' RELEASE_ID='${RELEASE_ID}' PHP_BIN='${PHP_BIN}' KEEP='${KEEP}' bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          DEPLOY_BASE="${DEPLOY_BASE:-/var/www/77fb2042-b362-46a6-bf46-d8fe02da24eb/laravel_app_deploy}"
          RELEASES_DIR="${DEPLOY_BASE}/releases"
          SHARED_DIR="${DEPLOY_BASE}/shared"
          CURRENT_DIR="${DEPLOY_BASE}/current"
          NEW_RELEASE="${RELEASES_DIR}/${RELEASE_ID}"
          PHP="${PHP_BIN:-php}"
          KEEP="${KEEP:-3}"

          echo "─── Deploy: ${RELEASE_ID} ───"

          mkdir -p "${RELEASES_DIR}" \
            "${CURRENT_DIR}" \
            "${SHARED_DIR}/storage/app/public" \
            "${SHARED_DIR}/storage/framework/cache/data" \
            "${SHARED_DIR}/storage/framework/sessions" \
            "${SHARED_DIR}/storage/framework/views" \
            "${SHARED_DIR}/storage/framework/testing" \
            "${SHARED_DIR}/storage/logs"

          if [ ! -f "${SHARED_DIR}/.env" ]; then
            echo "❌ ERROR: ${SHARED_DIR}/.env not found. Run first-time setup." >&2
            exit 1
          fi
          if ! grep -q '^APP_KEY=base64:' "${SHARED_DIR}/.env"; then
            echo "❌ ERROR: APP_KEY missing/empty in ${SHARED_DIR}/.env" >&2
            exit 1
          fi

          # ── Step 1: Extract staging release ────────────────────────────────
          mkdir -p "${NEW_RELEASE}"
          tar -xzf "/tmp/release-${RELEASE_ID}.tar.gz" -C "${NEW_RELEASE}"
          rm -f "/tmp/release-${RELEASE_ID}.tar.gz"

          # ── Step 2: Wire shared paths into staging (for migrate only) ─────
          rm -rf "${NEW_RELEASE}/storage"
          ln -sfn "${SHARED_DIR}/storage" "${NEW_RELEASE}/storage"
          ln -sfn "${SHARED_DIR}/.env"     "${NEW_RELEASE}/.env"

          # ── Step 3: Migrate in staging BEFORE cutover ─────────────────────
          cd "${NEW_RELEASE}"
          echo "→ optimize:clear (staging)"
          "${PHP}" artisan optimize:clear
          echo "→ migrate --force (staging)"
          "${PHP}" artisan migrate --force

          # ── Step 4: Cutover — rsync into real current/ (LiteSpeed-safe) ───
          # LiteSpeed on Enhance will NOT serve static assets through symlinks.
          # `current` MUST be a real directory; do NOT use ln -sfn here.
          echo "→ rsync cutover: ${NEW_RELEASE}/ → ${CURRENT_DIR}/"
          mkdir -p "${CURRENT_DIR}"
          rsync -a --delete \
            --exclude='storage' \
            --exclude='public/storage' \
            "${NEW_RELEASE}/" "${CURRENT_DIR}/"
          cp "${SHARED_DIR}/.env" "${CURRENT_DIR}/.env" 2>/dev/null || true
          rm -rf "${CURRENT_DIR}/storage"
          ln -sfn "${SHARED_DIR}/storage" "${CURRENT_DIR}/storage"
          mkdir -p "${CURRENT_DIR}/public/storage"
          rsync -a "${SHARED_DIR}/storage/app/public/" "${CURRENT_DIR}/public/storage/" 2>/dev/null || true
          chmod -R a+rX "${CURRENT_DIR}/public"
          echo "✅ Cutover complete: ${CURRENT_DIR}/"

          # ── Step 5: Cache + Filament assets in LIVE current/ ─────────────
          cd "${CURRENT_DIR}"
          echo "→ filament:assets (live)"
          "${PHP}" artisan filament:assets
          echo "→ config:cache (live)"
          "${PHP}" artisan config:cache
          echo "→ route:cache (live)"
          "${PHP}" artisan route:cache
          echo "→ view:cache (live)"
          "${PHP}" artisan view:cache
          echo "→ queue:restart"
          "${PHP}" artisan queue:restart 2>/dev/null || true

          # ── Step 6: Prune old staging releases ─────────────────────────────
          cd "${RELEASES_DIR}"
          ls -1dt */ 2>/dev/null | tail -n +$((KEEP + 1)) | while read -r old; do
            echo "🗑  Pruning old release: ${old}"
            rm -rf "${old}"
          done

          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "✅ Deploy complete: ${RELEASE_ID}"
          echo "   Live path: ${CURRENT_DIR}/public"
          echo "════════════════════════════════════════════════════════════"
          REMOTE_SCRIPT

      - name: Remove SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

# =============================================================================
# 📋 ONE-TIME SERVER SETUP (reference)
# =============================================================================
#   DEPLOY_BASE=/var/www/77fb2042-b362-46a6-bf46-d8fe02da24eb/laravel_app_deploy
#   mkdir -p "${DEPLOY_BASE}"/{releases,current,shared/storage/{app/public,framework/{cache/data,sessions,views,testing},logs}}
#   nano "${DEPLOY_BASE}/shared/.env"
#   chmod -R 775 "${DEPLOY_BASE}/shared/storage"
#
#   Enhance Document Root: ${DEPLOY_BASE}/current/public
#   NOTE: current/ must be a REAL directory — not a symlink.
# =============================================================================
